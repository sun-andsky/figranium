name: Sync to Hugging Face Hub

on:
  push:
    branches: [main, dev]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://asermnasr:$HF_TOKEN@huggingface.co/spaces/asermnasr/figranium-testing HEAD:main
