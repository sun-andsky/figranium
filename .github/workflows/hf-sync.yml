name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main] # Triggers on updates to main or dev branches

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://asermnasr:$HF_TOKEN@huggingface.co/spaces/asermnasr/figranium-testing
          git push --force hf main
